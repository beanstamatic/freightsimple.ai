# This workflow builds a Docker container, publishes it to Google Artifact
# Registry, and deploys it to GKE when there is a push to the "main" branch.
#
# Prerequisites — add the following repository secrets:
#   GCP_PROJECT_ID          : Google Cloud project ID
#   GCP_GAR_LOCATION        : Artifact Registry region (e.g. us-central1)
#   GCP_GKE_CLUSTER         : GKE cluster name
#   GCP_GKE_ZONE            : GKE cluster zone (e.g. us-central1-c)
#   GCP_WIF_PROVIDER        : Workload Identity Federation provider resource name
#                             (projects/NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER)
#
# Required Google Cloud APIs:
#   - Artifact Registry      (artifactregistry.googleapis.com)
#   - Kubernetes Engine      (container.googleapis.com)
#   - IAM Credentials API    (iamcredentials.googleapis.com)
#
# Required IAM roles for the WIF service account:
#   - Artifact Registry Administrator  (roles/artifactregistry.admin)
#   - Kubernetes Engine Developer      (roles/container.developer)

name: 'Build and Deploy to GKE'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  GAR_LOCATION: '${{ secrets.GCP_GAR_LOCATION }}'
  GKE_CLUSTER: '${{ secrets.GCP_GKE_CLUSTER }}'
  GKE_ZONE: '${{ secrets.GCP_GKE_ZONE }}'
  WORKLOAD_IDENTITY_PROVIDER: '${{ secrets.GCP_WIF_PROVIDER }}'
  DEPLOYMENT_NAME: 'freightsimple-ai'
  REPOSITORY: 'freightsimple-ai'
  IMAGE: 'freightsimple-ai'

jobs:
  setup-build-publish-deploy:
    name: 'Setup, Build, Publish, and Deploy'
    runs-on: 'ubuntu-latest'
    environment: 'production'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2' # google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: 'Docker Auth'
        uses: 'docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567' # docker/login-action@v3
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: 'Set up GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@6051de21ad50fbb1767bc93c11357a49082ad116' # google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          location: '${{ env.GKE_ZONE }}'

      - name: 'Build and push Docker container'
        run: |-
          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"

          docker build \
            --tag "${DOCKER_TAG}" \
            .

          docker push "${DOCKER_TAG}"

      - name: 'Set up Kustomize'
        run: |-
          curl -sfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar -xz
          chmod u+x ./kustomize

      - name: 'Deploy to GKE'
        run: |-
          cd k8s
          ../kustomize edit set image \
            LOCATION-docker.pkg.dev/PROJECT_ID/REPOSITORY/IMAGE:TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"
          ../kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/${DEPLOYMENT_NAME}
          kubectl get services -o wide
