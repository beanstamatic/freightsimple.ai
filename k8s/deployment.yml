apiVersion: apps/v1
kind: Deployment
metadata:
  name: freightsimple-ai
  labels:
    app: freightsimple-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: freightsimple-ai
  template:
    metadata:
      labels:
        app: freightsimple-ai
    spec:
      containers:
        - name: freightsimple-ai
          image: LOCATION-docker.pkg.dev/PROJECT_ID/REPOSITORY/IMAGE:TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
